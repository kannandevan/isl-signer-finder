# Processing Settings
processing:
  num_workers: 4                 # Number of parallel video processing workers
  max_splits: 10                 # Maximum number of intervals to check (starts at 5, increments up to max_splits)
  db_path: "checkpoints.db"      # SQLite database for resumable execution
  log_level: "INFO"              # Logging level: DEBUG, INFO, WARNING, ERROR
  ffmpeg_timeout: 30             # Timeout for ffmpeg frame extraction in seconds

# Detection Settings
detection:
  crop_left_ratio: 0.40          # We only analyze the left 40% of the screen
  confidence_threshold: 0.6      # Minimum confidence to consider a positive match
  use_haarcascade: true          # Use fast Haar Cascades for layout/human detection

# Output Settings
output:
  csv_path: "output/results.csv"
  xlsx_path: "output/results.xlsx"
  save_frames: false             # If true, saves the positive detected frames for debugging
  frames_dir: "output/frames"
